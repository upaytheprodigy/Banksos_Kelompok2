name: banksos
description: Bank Soal Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mongo_dart: ^0.10.3
  hive: ^2.2.3
  
  #Local DB
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3

  #State Management
  flutter_riverpod: ^2.5.1
  
  #Fonts
  google_fonts: ^6.2.1
  
  bcrypt: ^1.1.3
  uuid: ^4.4.0

  # Routing
  go_router: ^13.2.0

  # Env
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0


flutter:
  uses-material-design: true

  assets:
    - .env